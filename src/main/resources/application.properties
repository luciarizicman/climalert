spring.application.name=climalert

# --- Base de datos (H2 en archivo) ---
spring.datasource.url=jdbc:h2:file:./data/climalert;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- WeatherAPI ---
weatherapi.url-base=https://api.weatherapi.com/v1
weatherapi.clave-api=${WEATHERAPI_KEY:CHANGE_ME}
weatherapi.ubicacion=Buenos Aires,Argentina

# --- Umbrales de alerta ---
alerta.umbral-temperatura-c=35
alerta.umbral-humedad-porcentaje=60
alerta.destinatarios=admin@clima.com,emergencias@clima.com,meteorologia@clima.com

# --- Correo saliente (SMTP) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
